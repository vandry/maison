<html>
  <head>
    <link rel="stylesheet" href="maison.css">
    <title>Maison</title>
  </head>
  <body>
    <div class="part0">
      <div>
        <div class="heating">
          <span class="light_unknown">
            <img src="radiator_unknown.svg" class="l_unknown" />
            <img src="radiator_on.svg" class="l_on" />
            <img src="radiator_off.svg" class="l_off" />
          </span>
        </div>
        <div class="heating_override">
          <span class="light_unknown">
            <img src="override.svg" class="l_on" />
            <img src="scheduled.svg" class="l_off" />
          </span>
        </div>
        <div>
          <div class="heating_timer"></div>
          <div class="heating_timer_popup">
            <div class="closer"><img src="cross.svg" /></div>
            <span>Heating<br />override duration</span>
            <img src="clock_hours.svg" />
            <img src="clock_minutes.svg" />
          </div>
        </div>
      </div>
      <div>
        <div class="hot_water">
          <span class="light_unknown">
            <img src="unknown_water.svg" class="l_unknown" />
            <img src="hot_water.svg" class="l_on" />
            <img src="cold_water.svg" class="l_off" />
          </span>
        </div>
        <div class="hot_water_override">
          <span class="light_unknown">
            <img src="override.svg" class="l_on" />
            <img src="scheduled.svg" class="l_off" />
          </span>
        </div>
        <div>
          <div class="hot_water_timer"></div>
          <div class="hot_water_timer_popup">
            <div class="closer"><img src="cross.svg" /></div>
            <span>Hot Water<br />override duration</span>
            <img src="clock_hours.svg" />
            <img src="clock_minutes.svg" />
          </div>
        </div>
      </div>
      <div class="clock"></div>
    </div>
    <div class="part1">
      <table class="temperatures">
        <tbody>
          <tr class="climate-bottom">
            <td>Den</td>
            <td class="thermostat"><div>
              <div class="livetemp"></div>
              <div class="thermostat_going">&#10145;</div>
              <div class="colder"><img src="colder.svg" /></div>
              <div class="setpoint"></div>
              <div class="warmer"><img src="warmer.svg" /></div>
            </div></td>
          </tr>
          <tr class="climate-kitchen">
            <td>Kitchen</td>
            <td class="thermostat"><div>
              <div class="livetemp"></div>
              <div class="thermostat_going">&#10145;</div>
              <div class="colder"><img src="colder.svg" /></div>
              <div class="setpoint"></div>
              <div class="warmer"><img src="warmer.svg" /></div>
            </div></td>
          </tr>
          <tr class="climate-main">
            <td>Main</td>
            <td class="thermostat"><div>
              <div class="livetemp"></div>
              <div class="thermostat_going">&#10145;</div>
              <div class="colder"><img src="colder.svg" /></div>
              <div class="setpoint"></div>
              <div class="warmer"><img src="warmer.svg" /></div>
            </div></td>
          </tr>
          <tr class="climate-middle">
            <td>Lower bedroom</td>
            <td class="thermostat"><div>
              <div class="livetemp"></div>
              <div class="thermostat_going">&#10145;</div>
              <div class="colder"><img src="colder.svg" /></div>
              <div class="setpoint"></div>
              <div class="warmer"><img src="warmer.svg" /></div>
            </div></td>
          </tr>
          <tr class="climate-top">
            <td>Upper bedroom</td>
            <td class="thermostat"><div>
              <div class="livetemp"></div>
              <div class="thermostat_going">&#10145;</div>
              <div class="colder"><img src="colder.svg" /></div>
              <div class="setpoint"></div>
              <div class="warmer"><img src="warmer.svg" /></div>
            </div></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="part2">
      <table border="1">
        <thead><tr><th colspan="2">Kitchen</th></tr></thead>
        <tbody>
          <tr>
            <td align="center" width="50%" valign="middle" class="kitchen_lights">
              <span class="light_unknown">
                <img src="light_unknown.svg" class="l_unknown" />
                <img src="light_on.svg" class="l_on" />
                <img src="light_off.svg" class="l_off" />
                <img src="light_half.svg" class="l_some" />
              </span>
            </td>
            <td align="center" width="50%" valign="middle" class="kitchen_details">
              <input type="button" value="&middot;&middot;&middot;" />
            </td>
          </tr>
        </tbody>
      </table>
      <table border="1">
        <thead><tr><th colspan="2">Garden</th></tr></thead>
        <tbody>
          <tr>
            <td align="center" width="50%" valign="middle" class="garden_lights">
              <span class="light_unknown">
                <img src="light_unknown.svg" class="l_unknown" />
                <img src="light_on.svg" class="l_on" />
                <img src="light_off.svg" class="l_off" />
              </span>
            </td>
            <td align="center" width="50%" valign="middle" class="garden_lights_timer">
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="kitchen_popup">
      <div class="closer"><img src="cross.svg" /></div>
      <div class="fit fit_1_3">
        <span>Ceiling</span>
        <div class="kitchen_ceiling">
          <span class="light_unknown">
            <img src="light_unknown.svg" class="l_unknown" />
            <img src="light_on.svg" class="l_on" />
            <img src="light_off.svg" class="l_off" />
          </span>
        </div>
      </div>
      <div class="fit fit_2_3">
        <span>Counters</span>
        <div class="kitchen_under_cupboards">
          <span class="light_unknown">
            <img src="light_unknown.svg" class="l_unknown" />
            <img src="light_on.svg" class="l_on" />
            <img src="light_off.svg" class="l_off" />
          </span>
        </div>
      </div>
      <div class="fit fit_3_3">
        <span>Stairs</span>
        <div class="kitchen_under_stairs">
          <span class="light_unknown">
            <img src="light_unknown.svg" class="l_unknown" />
            <img src="light_on.svg" class="l_on" />
            <img src="light_off.svg" class="l_off" />
          </span>
        </div>
      </div>
    </div>
    <script src="bundle.js"></script>
  </body>
</html>
