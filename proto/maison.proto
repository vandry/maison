syntax = "proto2";

package maison;

import "google/protobuf/empty.proto";

message Boiler {
  optional bool heating = 1;
  optional bool hot_water = 2;
}

message Climate {
  optional string unit = 1;
  optional double battery = 2;
  optional double temperature = 3;
  optional double humidity = 4;
}

message SimpleSwitch {
  optional bool state = 1;
}

service Maison {
  rpc MonitorLiveTemperatures(google.protobuf.Empty) returns (stream Climate) {}
  rpc MonitorKitchenCeiling(google.protobuf.Empty) returns (stream SimpleSwitch) {}
  rpc MonitorKitchenUnderCupboards(google.protobuf.Empty) returns (stream SimpleSwitch) {}
  rpc MonitorKitchenUnderStairs(google.protobuf.Empty) returns (stream SimpleSwitch) {}
  rpc MonitorBoiler(google.protobuf.Empty) returns (stream Boiler) {}
}
