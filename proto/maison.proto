syntax = "proto2";

package maison;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message Boiler {
  optional bool heating = 1;
  optional bool hot_water = 2;
}

message Climate {
  optional string unit = 1;
  optional double battery = 2;
  optional double temperature = 3;
  optional double humidity = 4;
}

message SimpleSwitch {
  optional bool state = 1;
}

message MaisonState {
  optional google.protobuf.Timestamp now = 2;
  optional google.protobuf.Timestamp garden_light_until = 1;
}

message MonitorEverythingRequest {
  optional bool want_live_temperatures = 1;
  optional bool want_kitchen_ceiling = 2;
  optional bool want_kitchen_under_cupboards = 3;
  optional bool want_kitchen_under_stairs = 4;
  optional bool want_boiler = 5;
  optional bool want_garden_lights = 6;
  optional bool want_maison = 7;
}

message MonitorResponse {
  oneof message {
    Climate live_temperature = 1;
    SimpleSwitch kitchen_ceiling = 2;
    SimpleSwitch kitchen_under_cupboards = 3;
    SimpleSwitch kitchen_under_stairs = 4;
    Boiler boiler = 5;
    SimpleSwitch garden_lights = 6;
    MaisonState maison = 7;
  }
}

message SetLightsRequest {
  // absent=indefinitely on, 0=off
  optional uint64 duration_ms = 1;
}

service Maison {
  rpc MonitorEverything(MonitorEverythingRequest) returns (stream MonitorResponse) {}
  rpc SetGardenLights(SetLightsRequest) returns (google.protobuf.Empty) {}
}
