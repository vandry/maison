syntax = "proto2";

package maison;

import "google/protobuf/timestamp.proto";

message Hysteresis {
  optional google.protobuf.Timestamp until = 1;
  optional bool state = 2;
  optional uint64 schedule_unique = 3;
}

message SetPoint2 {
  optional string zone = 1;
  optional double setpoint = 2;
  optional Hysteresis hysteresis = 3;
}

message PersistentState {
  optional google.protobuf.Timestamp garden_light_until = 1;
  optional google.protobuf.Timestamp hot_water_override_until = 3;
  optional google.protobuf.Timestamp heating_override_until = 4;
  repeated SetPoint2 heating_override = 5;
}
